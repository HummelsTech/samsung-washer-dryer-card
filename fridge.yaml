# ============================================================
# Samsung Koelvriescombinatie Card — LG iconen stijl
# Iconen: /local/apparaten/lg-icons/
# Achtergrond: /local/apparaten/hass-washer-card-bg.png
# ============================================================

type: vertical-stack
cards:

  - type: picture-elements
    elements:

      # Koelkast deur
      - type: image
        entity: binary_sensor.koelvriescombinatie_fridge_door
        image: /local/apparaten/lg-icons/fridge-closed.png
        state_image:
          'on': /local/apparaten/lg-icons/fridge-open.png
        style:
          top: 35%
          left: 25%
          width: 25%
          image-rendering: crisp-edges

      # Power Cool
      - type: image
        entity: switch.koelvriescombinatie_power_cool
        image: /local/apparaten/lg-icons/express-cool-for-fridge-off.png
        state_image:
          'on': /local/apparaten/lg-icons/express-cool-for-fridge-on.png
        style:
          top: 35%
          left: 55%
          width: 25%
          image-rendering: crisp-edges

      # Power Freeze
      - type: image
        entity: switch.koelvriescombinatie_power_freeze
        image: /local/apparaten/lg-icons/express-freeze-for-fridge-off.png
        state_image:
          'on': /local/apparaten/lg-icons/express-freeze-for-fridge-on.png
        style:
          top: 35%
          left: 80%
          width: 25%
          image-rendering: crisp-edges

      # Koelkast temp display — placeholder (grijs)
      - type: state-label
        entity: sensor.koelvriescombinatie_vermogen
        prefix: '00°C'
        style:
          color: '#555'
          font-family: segment7
          font-size: 40px
          left: 68%
          top: 74%
          transform: 'translate(-100%,-50%)'

      # Koelkast temp display — actief (cyaan)
      - type: state-label
        entity: number.koelvriescombinatie_koelkasttemperatuur
        suffix: '°C'
        style:
          color: '#00bcd4'
          font-family: segment7
          font-size: 40px
          left: 68%
          top: 74%
          transform: 'translate(-100%,-50%)'

      # Vriezer temp display — placeholder (grijs)
      - type: state-label
        entity: sensor.koelvriescombinatie_vermogen
        prefix: '00°C'
        style:
          color: '#555'
          font-family: segment7
          font-size: 40px
          left: 97%
          top: 74%
          transform: 'translate(-100%,-50%)'

      # Vriezer temp display — actief (groen)
      - type: state-label
        entity: number.koelvriescombinatie_freezer_temperature
        suffix: '°C'
        style:
          color: '#8df427'
          font-family: segment7
          font-size: 40px
          left: 97%
          top: 74%
          transform: 'translate(-100%,-50%)'

      image: /local/apparaten/hass-washer-card-bg.png

  # ── Status + bediening ───────────────────────────────────
  - type: entities
    entities:
      - entity: binary_sensor.koelvriescombinatie_fridge_door
        name: Koelkastdeur
        icon: mdi:fridge-top
      - entity: binary_sensor.koelvriescombinatie_freezer_door
        name: Vriezerdeur
        icon: mdi:fridge-bottom
      - type: divider
      - entity: number.koelvriescombinatie_koelkasttemperatuur
        name: Koelkast instelling
        icon: mdi:coolant-temperature
      - entity: number.koelvriescombinatie_freezer_temperature
        name: Vriezer instelling
        icon: mdi:snowflake-thermometer
      - type: divider
      - entity: switch.koelvriescombinatie_power_cool
        name: Power Cool
        icon: mdi:snowflake-alert
      - entity: switch.koelvriescombinatie_power_freeze
        name: Power Freeze
        icon: mdi:snowflake-variant
      - type: divider
      - entity: sensor.koelvriescombinatie_vermogen
        name: Huidig vermogen
        icon: mdi:lightning-bolt
      - entity: sensor.koelvriescombinatie_energie
        name: Totaal energie
        icon: mdi:counter
    state_color: true
