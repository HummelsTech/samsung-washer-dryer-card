# ============================================================
# Samsung Washer-Dryer Combo Card — LG iconen stijl
# Iconen: /local/apparaten/lg-icons/
# Achtergrond: /local/apparaten/hass-washer-card-bg.png
# ============================================================

type: vertical-stack
cards:

  - type: picture-elements
    elements:

      # ── WAS-FASE ICONEN ───────────────────────────────────

      # Wassen
      - type: image
        entity: sensor.was_taakstatus
        image: /local/apparaten/lg-icons/wash.png
        state_image:
          wash: /local/apparaten/lg-icons/wash-on.png
          ai_wash: /local/apparaten/lg-icons/wash-on.png
          pre_wash: /local/apparaten/lg-icons/wash-on.png
        style:
          top: 33%
          left: 33%
          width: 20%
          image-rendering: crisp-edges

      # Spoelen
      - type: image
        entity: sensor.was_taakstatus
        image: /local/apparaten/lg-icons/rinse.png
        state_image:
          rinse: /local/apparaten/lg-icons/rinse-on.png
          ai_rinse: /local/apparaten/lg-icons/rinse-on.png
        style:
          top: 33%
          left: 51%
          width: 20%
          image-rendering: crisp-edges

      # Centrifuge
      - type: image
        entity: sensor.was_taakstatus
        image: /local/apparaten/lg-icons/spin.png
        state_image:
          spin: /local/apparaten/lg-icons/spin-on.png
          ai_spin: /local/apparaten/lg-icons/spin-on.png
        style:
          top: 33%
          left: 69%
          width: 20%
          image-rendering: crisp-edges

      # ── DROOG-FASE ICONEN ─────────────────────────────────

      # Drogen
      - type: image
        entity: sensor.was_taakstatus
        image: /local/apparaten/lg-icons/dry.png
        state_image:
          drying: /local/apparaten/lg-icons/dry-on.png
        style:
          top: 55%
          left: 33%
          width: 20%
          image-rendering: crisp-edges

      # Afkoelen / anti-kreuk
      - type: image
        entity: sensor.was_taakstatus
        image: /local/apparaten/lg-icons/cool.png
        state_image:
          cooling: /local/apparaten/lg-icons/cool-on.png
          wrinkle_prevent: /local/apparaten/lg-icons/cool-on.png
        style:
          top: 55%
          left: 51%
          width: 20%
          image-rendering: crisp-edges

      # ── STATUS ICONEN ONDERIN ─────────────────────────────

      # WiFi / afstandsbediening
      - type: image
        entity: binary_sensor.was_afstandsbediening
        image: /local/apparaten/lg-icons/wifi.png
        state_image:
          'on': /local/apparaten/lg-icons/wifi-on.png
        style:
          top: 73%
          left: 32%
          width: 10%
          image-rendering: crisp-edges

      # Child lock
      - type: image
        entity: binary_sensor.was_child_lock
        image: /local/apparaten/lg-icons/lock.png
        state_image:
          'on': /local/apparaten/lg-icons/lock-on.png
        style:
          top: 73%
          left: 45%
          width: 10%
          image-rendering: crisp-edges

      # Segment display — placeholder (grijs)
      - type: state-label
        entity: sensor.was_machinestatus
        prefix: '00:00'
        style:
          color: '#555'
          font-family: segment7
          font-size: 50px
          left: 95%
          top: 74%
          transform: 'translate(-100%,-50%)'

      # Segment display — resterende tijd (groen)
      - type: state-label
        entity: sensor.was_resterende_tijd
        style:
          color: '#8df427'
          font-family: segment7
          font-size: 50px
          left: 95%
          top: 74%
          transform: 'translate(-100%,-50%)'

      image: /local/apparaten/hass-washer-card-bg.png

  # ── DETAIL SECTIE (alleen actief bij run/pause) ──────────
  - type: conditional
    conditions:
      - entity: sensor.was_machinestatus
        state_not: stop
    card:
      type: entities
      entities:
        - entity: sensor.was_taakstatus
          name: Huidige taak
          icon: mdi:washing-machine
        - entity: sensor.was_progressie
          name: Voortgang
          icon: mdi:progress-clock
        - entity: sensor.was_resterende_tijd
          name: Resterende tijd
          icon: mdi:timer-outline
        - type: divider
        - entity: select.was_water_temperature
          name: Watertemperatuur
          icon: mdi:coolant-temperature
        - entity: select.was_centrifuge_snelheid
          name: Centrifuge snelheid
          icon: mdi:rotate-right
        - entity: number.was_spoelcycli
          name: Spoelcycli
          icon: mdi:water-sync
        - entity: switch.was_bubble_soak
          name: Bubble Soak
          icon: mdi:bubble-fields
      state_color: true
