## Vaatwasser card

### Vereisten
- [WashData](https://github.com/3dg1luk43/ha_washdata) integratie (via HACS)
- Smart plug met vermogensmeting (bijv. Shelly Plus Plug S)

### Entiteiten
De vaatwasser card gebruikt WashData entiteiten — geen SmartThings nodig. Werkt met elke vaatwasser op een smart plug.

| Entiteit | Rol |
|---|---|
| `sensor.vaatwasserdata_status` | Hoofdstatus (off / idle / running / paused / finished) |
| `sensor.vaatwasserdata_huidige_fase` | Huidige fase (Washing / Rinsing / Drying) |
| `sensor.vaatwasserdata_programma` | Gedetecteerd programma |
| `sensor.vaatwasserdata_voortgang` | Voortgang in % |
| `sensor.vaatwasserdata_resterende_tijd` | Resterende tijd in minuten |
| `binary_sensor.vaatwasserdata_actief` | Machine actief ja/nee |
| `button.vaatwasserdata_pauzeer_cyclus` | Pauzeer knop |
| `button.vaatwasserdata_hervat_cyclus` | Hervat knop |

### Training
WashData leert het vermogensprofiel van je vaatwasser automatisch. Draai minimaal 2-3 volledige cycli (bijv. 1x eco + 1x intensief) voor betrouwbare programmadetectie.

