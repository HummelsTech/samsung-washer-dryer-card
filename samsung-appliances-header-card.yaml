## Status header card

Een decoratieve card die in één oogopslag de status van alle apparaten toont.

**Vereist:** `button-card` via HACS

### Wat wordt getoond

| Kolom | Inhoud |
|---|---|
| Wasmachine | Actief/gestopt + huidige taak + resterende tijd |
| Koelkast | Koelkast°C + vriezer°C + deur open waarschuwing |
| Vaatwasser | Actief/gestopt + programma + voortgang % |

### Dynamische achtergrond
- **Normaal** — diep donker
- **Apparaat actief** — subtiel groen glow
- **Koelkastdeur open** — rood glow als waarschuwing

Zet deze card als eerste card in je dashboard sectie, boven de apparaat cards.

